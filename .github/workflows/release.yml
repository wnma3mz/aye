name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build aye-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary: aye
            archive: tar.gz
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            binary: aye
            archive: tar.gz
          - os: macos-14
            platform: darwin-arm64
            binary: aye
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group build --locked

      - name: Test
        run: uv run python -m unittest discover -s tests

      - name: Build binary
        run: uv run --group build python scripts/build.py --clean

      - name: Set archive name
        shell: bash
        run: |
          echo "ARCHIVE_NAME=aye-${GITHUB_REF_NAME}-${{ matrix.platform }}.tar.gz" >> "$GITHUB_ENV"
          echo "LATEST_ARCHIVE_NAME=aye-${{ matrix.platform }}.tar.gz" >> "$GITHUB_ENV"

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.platform }}
          cp dist/${{ matrix.binary }} artifacts/${{ matrix.platform }}/
          chmod +x artifacts/${{ matrix.platform }}/${{ matrix.binary }} || true

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "$ARCHIVE_NAME" -C artifacts/${{ matrix.platform }} .
          cp "$ARCHIVE_NAME" "$LATEST_ARCHIVE_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aye-${{ github.ref_name }}-${{ matrix.platform }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.LATEST_ARCHIVE_NAME }}
          if-no-files-found: ignore

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.LATEST_ARCHIVE_NAME }}
