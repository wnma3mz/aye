name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: aye-linux-x64
            binary: aye
            archive: tar.gz
          - os: ubuntu-24.04-arm
            artifact: aye-linux-arm64
            binary: aye
            archive: tar.gz
          - os: macos-13
            artifact: aye-darwin-x64
            binary: aye
            archive: tar.gz
          - os: macos-14
            artifact: aye-darwin-arm64
            binary: aye
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group build --locked

      - name: Test
        run: uv run python -m unittest discover -s tests

      - name: Build binary
        run: uv run --group build python scripts/build.py --clean

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.artifact }}
          cp dist/${{ matrix.binary }} artifacts/${{ matrix.artifact }}/
          chmod +x artifacts/${{ matrix.artifact }}/${{ matrix.binary }} || true

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C artifacts/${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
